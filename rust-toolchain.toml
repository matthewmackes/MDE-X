# rust-toolchain.toml — pins the Rust toolchain for Mackes XFCE Workstation.
#
# Mirrors what Fedora 44's `rust` package ships, so RPM builds on Mock
# get the same toolchain a developer gets with `dnf install rust cargo`.
# Bump when Fedora bumps; expect minor-version drift across releases.

[toolchain]
channel = "1.95.0"
components = ["rustfmt", "clippy"]
targets   = ["x86_64-unknown-linux-gnu"]
profile   = "minimal"
